name: yuncan-cms

x-backend-image: &backend-image
  image: ${BACKEND_IMAGE:-ghcr.io/zhaoyongze123/cms-backend:latest}

x-frontend-common: &frontend-common
  restart: unless-stopped
  env_file:
    - .env.prod

x-frontend-env: &frontend-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_OPTIONS: --max-old-space-size=1024

services:
  db:
    image: ${DB_IMAGE:-ghcr.io/zhaoyongze123/cms-pgvector:pg15}
    restart: unless-stopped
    volumes:
      - /data/yuncan-cms/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-ghcr.io/zhaoyongze123/cms-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /data/yuncan-cms/redis:/data
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    <<: *backend-image
    restart: unless-stopped
    working_dir: /app/apps/cms-api
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "120"]
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PYTHONPATH: /app/apps/cms-api:/app
      NEXT_EDITOR_INTERNAL_URL: http://editor-web:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()"]
      start_period: 45s
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - /data/yuncan-cms/media:/app/apps/cms-api/media
      - /data/yuncan-cms/static:/app/apps/cms-api/staticfiles
    ports:
      - "127.0.0.1:18001:8000"

  ai-service:
    <<: *backend-image
    restart: unless-stopped
    entrypoint: []
    working_dir: /app/apps/ai-service
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app/apps/ai-service:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:18002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    <<: *backend-image
    restart: unless-stopped
    entrypoint: []
    working_dir: /app/apps/ai-service
    command: ["python", "-m", "app.worker_stub"]
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app/apps/ai-service:/app/apps/cms-api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  editor-web:
    <<: *frontend-common
    image: ${STUDIO_IMAGE:-ghcr.io/zhaoyongze123/cms-studio-web:latest}
    environment:
      <<: *frontend-env
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_EDITOR_DEV_ORIGIN: ${CMS_SITE_URL}
      DJANGO_INTERNAL_BASE_URL: ${CMS_SITE_URL}
      NEXT_PUBLIC_DJANGO_BASE_URL: ${CMS_SITE_URL}
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/django-admin/next-editor/login').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      start_period: 40s
      interval: 20s
      timeout: 10s
      retries: 20
    ports:
      - "127.0.0.1:13000:3000"

  public-web:
    <<: *frontend-common
    image: ${PUBLIC_IMAGE:-ghcr.io/zhaoyongze123/cms-public-web:latest}
    environment:
      <<: *frontend-env
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: ${CMS_SITE_URL}
      NEXT_PUBLIC_SITE_URL: ${CMS_SITE_URL}
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/solutions').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      start_period: 40s
      interval: 20s
      timeout: 10s
      retries: 20
    ports:
      - "127.0.0.1:13003:3000"
