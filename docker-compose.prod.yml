services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    working_dir: /app/apps/cms-api
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "120"]
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PYTHONPATH: /app/apps/cms-api:/app
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      all_proxy: ""
      ALL_PROXY: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/').read()"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - media_data:/app/apps/cms-api/media
      - static_data:/app/apps/cms-api/staticfiles

  ai-service:
    build: .
    restart: unless-stopped
    entrypoint: []
    working_dir: /app/apps/ai-service
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app/apps/ai-service:/app
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      all_proxy: ""
      ALL_PROXY: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    entrypoint: []
    working_dir: /app/apps/ai-service
    command: ["python", "-m", "app.worker_stub"]
    env_file:
      - .env.prod
    environment:
      PYTHONPATH: /app/apps/ai-service:/app/apps/cms-api:/app
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      all_proxy: ""
      ALL_PROXY: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  editor-web:
    image: node:22-bookworm
    restart: unless-stopped
    working_dir: /app/apps/studio-web
    command:
      [
        "sh",
        "-c",
        "if [ ! -x node_modules/.bin/next ]; then npm ci; fi && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000",
      ]
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NEXT_EDITOR_DEV_ORIGIN: ${CMS_SITE_URL}
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      all_proxy: ""
      ALL_PROXY: ""
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/django-admin/next-editor/login').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 20
    volumes:
      - editor_web_node_modules:/app/apps/studio-web/node_modules
      - editor_web_next_cache:/app/apps/studio-web/.next

  public-web:
    image: node:22-bookworm
    restart: unless-stopped
    working_dir: /app/apps/public-web
    command:
      [
        "sh",
        "-c",
        "if [ ! -x node_modules/.bin/next ]; then npm ci; fi && npm run build && npm run start -- --hostname 0.0.0.0 --port 3003",
      ]
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://web:8000
      NEXT_PUBLIC_SITE_URL: ${CMS_SITE_URL}
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      all_proxy: ""
      ALL_PROXY: ""
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/solutions').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 20
    volumes:
      - public_web_node_modules:/app/apps/public-web/node_modules
      - public_web_next_cache:/app/apps/public-web/.next

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      public-web:
        condition: service_started
      editor-web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  editor_web_node_modules:
  editor_web_next_cache:
  public_web_node_modules:
  public_web_next_cache:
