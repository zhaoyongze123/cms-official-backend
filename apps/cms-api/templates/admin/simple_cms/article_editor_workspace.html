{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}{{ workspace_title }} | {{ site_title|default:_("Django site admin") }}{% endblock %}

{% block breadcrumbs %}
<ol class="breadcrumb float-sm-right">
  <li class="breadcrumb-item"><a href="{% url 'admin:index' %}">后台首页</a></li>
  <li class="breadcrumb-item"><a href="{% url 'admin:simple_cms_article_changelist' %}">文章管理</a></li>
  <li class="breadcrumb-item active">{{ workspace_title }}</li>
</ol>
{% endblock %}

{% block content %}
<div class="next-editor-admin-shell">
  <section class="next-editor-admin-frame card">
    <div class="card-body p-0">
      <iframe
        id="next-editor-frame"
        class="next-editor-frame"
        src="{{ next_editor_url }}"
        title="Next.js 文章编辑器"
        loading="eager"
      ></iframe>
    </div>
  </section>
</div>

<style>
  :root {
    --next-editor-frame-height: 1440px;
  }

  html {
    scroll-behavior: auto;
  }

  .next-editor-admin-shell {
    display: flex;
    flex-direction: column;
    min-height: var(--next-editor-frame-height);
  }

  .next-editor-admin-frame {
    flex: 1 1 auto;
    min-height: var(--next-editor-frame-height);
    border-radius: 18px;
    border: 1px solid var(--admin-border);
    box-shadow: var(--admin-shadow);
    overflow: hidden;
  }

  .next-editor-admin-frame .card-body {
    height: 100%;
    min-height: var(--next-editor-frame-height);
  }

  .next-editor-frame {
    width: 100%;
    height: var(--next-editor-frame-height);
    min-height: var(--next-editor-frame-height);
    border: 0;
    display: block;
    background: transparent;
  }
</style>

<script>
  (function () {
    const frame = document.getElementById("next-editor-frame");
    const fixedFrameHeight = 1440;
    if (!frame) {
      return;
    }

    if (window.history && "scrollRestoration" in window.history) {
      window.history.scrollRestoration = "manual";
    }
    window.scrollTo({ top: 0, behavior: "auto" });

    function syncFrameHeight() {
      const nextHeight = fixedFrameHeight;
      frame.style.height = `${nextHeight}px`;
      frame.style.minHeight = `${nextHeight}px`;
      document.documentElement.style.setProperty("--next-editor-frame-height", `${nextHeight}px`);
    }

    frame.addEventListener("load", syncFrameHeight);
    window.addEventListener("resize", syncFrameHeight);
    window.requestAnimationFrame(syncFrameHeight);
  })();
</script>
{% endblock %}
