services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wagtailcms
      POSTGRES_USER: wagtailcms
      POSTGRES_PASSWORD: wagtailcms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagtailcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    dns:
      - 223.5.5.5
      - 223.6.6.6
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
