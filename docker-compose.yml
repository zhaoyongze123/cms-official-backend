services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wagtailcms
      POSTGRES_USER: wagtailcms
      POSTGRES_PASSWORD: wagtailcms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagtailcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    dns:
      - 223.5.5.5
      - 223.6.6.6
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build: .
    command: ["uvicorn", "ai_service.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  editor-web:
    image: node:22-bookworm
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./editor-web:/app
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/studio/articles').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 20

  worker:
    build: .
    command: ["python", "-m", "ai_service.worker_stub"]
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
