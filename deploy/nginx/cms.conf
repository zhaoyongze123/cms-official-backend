server {
    listen 80;
    server_name yuncan.com 139.224.245.94;

    location /.well-known/ {
        root /www/wwwroot/www.yuncan.com;
    }

    location = /robots.txt {
        return 301 https://www.yuncan.com/robots.txt;
    }

    location / {
        return 301 https://www.yuncan.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name yuncan.com;

    ssl_certificate /etc/ssl/yuncan.com/yuncan.com.pem;
    ssl_certificate_key /etc/ssl/yuncan.com/yuncan.com.key;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    client_max_body_size 32m;

    location = /robots.txt {
        return 301 https://www.yuncan.com/robots.txt;
    }

    location = /sitemap.xml {
        return 301 https://www.yuncan.com/sitemap.xml;
    }

    location / {
        return 301 https://www.yuncan.com$request_uri;
    }
}

server {
    listen 80;
    server_name www.yuncan.com;

    location /.well-known/ {
        root /www/wwwroot/www.yuncan.com;
    }

    location = /robots.txt {
        root /www/wwwroot/www.yuncan.com;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.yuncan.com;

    ssl_certificate /etc/ssl/yuncan.com/yuncan.com.pem;
    ssl_certificate_key /etc/ssl/yuncan.com/yuncan.com.key;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    client_max_body_size 32m;

    location = /robots.txt {
        root /www/wwwroot/www.yuncan.com;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        root /www/wwwroot/www.yuncan.com;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        default_type application/xml;
    }

    location /django/static/ {
        alias /var/lib/docker/volumes/yuncan-cms-official_static_data/_data/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /django/media/ {
        alias /var/lib/docker/volumes/yuncan-cms-official_media_data/_data/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /media/ {
        alias /var/lib/docker/volumes/yuncan-cms-official_media_data/_data/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /django/django-admin/next-editor/ {
        rewrite ^/django/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:13000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /django/ {
        rewrite ^/django/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:18001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /django-admin/next-editor/ {
        proxy_pass http://127.0.0.1:13000/django-admin/next-editor/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /django-admin/ {
        proxy_pass http://127.0.0.1:18001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:13003;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}
