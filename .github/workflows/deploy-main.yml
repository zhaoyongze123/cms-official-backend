name: 部署 main 到生产环境

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-production
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/zhaoyongze123
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY || '' }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE || '' }}
  IMAGE_TAG: sha-${{ github.sha }}
  BACKEND_IMAGE: ghcr.io/zhaoyongze123/cms-backend
  STUDIO_IMAGE: ghcr.io/zhaoyongze123/cms-studio-web
  PUBLIC_IMAGE: ghcr.io/zhaoyongze123/cms-public-web
  DB_IMAGE: ghcr.io/zhaoyongze123/cms-pgvector
  REDIS_IMAGE: ghcr.io/zhaoyongze123/cms-redis
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-preflight:
    name: 生产 SSH 预检
    runs-on: ubuntu-latest
    steps:
      - name: 安装 SSH 私钥
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          test -n "$CLEAN_HOST"
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts

      - name: 校验 SSH 与部署目录
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          CLEAN_USER="$(printf '%s' "$PROD_SERVER_USER" | tr -d '\r\n' | xargs)"
          CLEAN_DEPLOY_PATH="$(printf '%s' "$PROD_DEPLOY_PATH" | tr -d '\r\n' | xargs)"
          test -n "$CLEAN_HOST"
          test -n "$CLEAN_USER"
          test -n "$CLEAN_DEPLOY_PATH"
          ssh -o BatchMode=yes -o ConnectTimeout=10 -i ~/.ssh/id_ed25519 \
            "${CLEAN_USER}@${CLEAN_HOST}" \
            "mkdir -p '${CLEAN_DEPLOY_PATH}' && echo 'ssh-preflight-ok'"

  verify:
    name: 测试与构建
    runs-on: ubuntu-latest
    needs: deploy-preflight
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghactions -d ghactions"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/studio-web/package-lock.json
            apps/public-web/package-lock.json

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r apps/cms-api/requirements/dev.txt \
            -r apps/ai-service/requirements/dev.txt

      - name: 安装 Studio 依赖
        working-directory: apps/studio-web
        run: npm install --include=dev --no-audit --no-fund

      - name: 安装 Public Web 依赖
        working-directory: apps/public-web
        run: npm install --include=dev --no-audit --no-fund

      - name: Django 检查
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: github-actions-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CSRF_TRUSTED_ORIGINS: http://localhost
          CMS_SITE_URL: http://localhost
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          AI_SERVICE_URL: http://localhost:8002
          DJANGO_INTERNAL_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
          NEXT_PUBLIC_AUTH_MODE: django-session
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/cms-api:${{ github.workspace }}
        working-directory: apps/cms-api
        run: python manage.py check

      - name: Django 测试
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: github-actions-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CSRF_TRUSTED_ORIGINS: http://localhost
          CMS_SITE_URL: http://localhost
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          AI_SERVICE_URL: http://localhost:8002
          DJANGO_INTERNAL_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
          NEXT_PUBLIC_AUTH_MODE: django-session
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/cms-api:${{ github.workspace }}
        working-directory: apps/cms-api
        run: python manage.py test

      - name: FastAPI 测试
        env:
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/ai-service:${{ github.workspace }}
        working-directory: apps/ai-service
        run: pytest

      - name: Studio Lint
        working-directory: apps/studio-web
        run: npm run lint

      - name: Studio 测试
        working-directory: apps/studio-web
        run: npm run test

      - name: Studio 构建
        env:
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_AUTH_MODE: django-session
        working-directory: apps/studio-web
        run: npm run build

      - name: Public Web 构建
        env:
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
        working-directory: apps/public-web
        run: npm run build

      - name: 契约校验
        run: |
          python3 -m json.tool contracts/article.schema.json > /dev/null
          python3 -m json.tool contracts/ai-review.schema.json > /dev/null
          python3 -m json.tool contracts/ai-suggestion.schema.json > /dev/null
          python3 -m json.tool contracts/ai-patch.schema.json > /dev/null
          python3 -m json.tool contracts/rag-search.schema.json > /dev/null
          python3 -m json.tool contracts/seo-context.schema.json > /dev/null
          python3 -m json.tool contracts/tiptap-document.schema.json > /dev/null

  build-and-push:
    name: 构建并推送生产镜像
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/studio-web/package-lock.json
            apps/public-web/package-lock.json

      - name: 生成前端生产产物
        env:
          NEXT_PUBLIC_DJANGO_BASE_URL: ${{ vars.CMS_ADMIN_SITE_URL || 'https://admin.example.com' }}
          NEXT_PUBLIC_EDITOR_BASE_URL: ${{ vars.CMS_ADMIN_SITE_URL || 'https://admin.example.com' }}
          NEXT_PUBLIC_AUTH_MODE: django-session
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: ${{ vars.CMS_SITE_URL || 'https://www.example.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.CMS_SITE_URL || 'https://www.example.com' }}
        run: |
          npm install --prefix apps/studio-web --include=dev --no-audit --no-fund
          npm install --prefix apps/public-web --include=dev --no-audit --no-fund
          npm run build --prefix apps/studio-web
          npm run build --prefix apps/public-web

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云 ACR
        if: ${{ vars.ACR_REGISTRY != '' && vars.ACR_NAMESPACE != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' }}
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          printf '%s' "$ACR_PASSWORD" | docker login "${ACR_REGISTRY}" -u "$ACR_USERNAME" --password-stdin

      - name: 同步 Postgres 基础镜像到 GHCR
        run: |
          docker pull --platform linux/amd64 pgvector/pgvector:pg15
          docker tag pgvector/pgvector:pg15 ${{ env.DB_IMAGE }}:pg15
          docker push ${{ env.DB_IMAGE }}:pg15

      - name: 同步 Redis 基础镜像到 GHCR
        run: |
          docker pull --platform linux/amd64 redis:7-alpine
          docker tag redis:7-alpine ${{ env.REDIS_IMAGE }}:7-alpine
          docker push ${{ env.REDIS_IMAGE }}:7-alpine

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}

      - name: 构建并推送 Studio 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/studio-web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.STUDIO_IMAGE }}:latest
            ${{ env.STUDIO_IMAGE }}:sha-${{ github.sha }}

      - name: 构建并推送 Public 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/public-web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.PUBLIC_IMAGE }}:latest
            ${{ env.PUBLIC_IMAGE }}:sha-${{ github.sha }}

      - name: 同步 GHCR 镜像到阿里云 ACR
        if: ${{ vars.ACR_REGISTRY != '' && vars.ACR_NAMESPACE != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' }}
        run: |
          ACR_BASE="${ACR_REGISTRY}/${ACR_NAMESPACE}"
          docker buildx imagetools create \
            --tag "${ACR_BASE}/cms-backend:latest" \
            --tag "${ACR_BASE}/cms-backend:${IMAGE_TAG}" \
            "${BACKEND_IMAGE}:${IMAGE_TAG}"
          docker buildx imagetools create \
            --tag "${ACR_BASE}/cms-studio-web:latest" \
            --tag "${ACR_BASE}/cms-studio-web:${IMAGE_TAG}" \
            "${STUDIO_IMAGE}:${IMAGE_TAG}"
          docker buildx imagetools create \
            --tag "${ACR_BASE}/cms-public-web:latest" \
            --tag "${ACR_BASE}/cms-public-web:${IMAGE_TAG}" \
            "${PUBLIC_IMAGE}:${IMAGE_TAG}"
          docker buildx imagetools create \
            --tag "${ACR_BASE}/cms-pgvector:pg15" \
            "${DB_IMAGE}:pg15"
          docker buildx imagetools create \
            --tag "${ACR_BASE}/cms-redis:7-alpine" \
            "${REDIS_IMAGE}:7-alpine"

  deploy:
    name: SSH 部署生产环境
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 SSH 私钥
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts

      - name: 上传生产环境变量
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          CLEAN_USER="$(printf '%s' "$PROD_SERVER_USER" | tr -d '\r\n' | xargs)"
          CLEAN_DEPLOY_PATH="$(printf '%s' "$PROD_DEPLOY_PATH" | tr -d '\r\n' | xargs)"
          if [ -n "${ACR_REGISTRY}" ] && [ -n "${ACR_NAMESPACE}" ]; then
            DEPLOY_IMAGE_BASE="${ACR_REGISTRY}/${ACR_NAMESPACE}"
          else
            DEPLOY_IMAGE_BASE="${IMAGE_NAMESPACE}"
          fi
          printf '%s\n' "$PROD_ENV_FILE" > .env.prod
          {
            echo "BACKEND_IMAGE=${DEPLOY_IMAGE_BASE}/cms-backend:${IMAGE_TAG}"
            echo "STUDIO_IMAGE=${DEPLOY_IMAGE_BASE}/cms-studio-web:${IMAGE_TAG}"
            echo "PUBLIC_IMAGE=${DEPLOY_IMAGE_BASE}/cms-public-web:${IMAGE_TAG}"
            echo "DB_IMAGE=${DEPLOY_IMAGE_BASE}/cms-pgvector:pg15"
            echo "REDIS_IMAGE=${DEPLOY_IMAGE_BASE}/cms-redis:7-alpine"
          } >> .env.prod
          ssh -i ~/.ssh/id_ed25519 "${CLEAN_USER}@${CLEAN_HOST}" "mkdir -p '${CLEAN_DEPLOY_PATH}'"
          scp -i ~/.ssh/id_ed25519 .env.prod \
            "${CLEAN_USER}@${CLEAN_HOST}:${CLEAN_DEPLOY_PATH}/.env.prod"

      - name: 上传部署编排文件
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          CLEAN_USER="$(printf '%s' "$PROD_SERVER_USER" | tr -d '\r\n' | xargs)"
          CLEAN_DEPLOY_PATH="$(printf '%s' "$PROD_DEPLOY_PATH" | tr -d '\r\n' | xargs)"
          scp -i ~/.ssh/id_ed25519 docker-compose.prod.yml \
            "${CLEAN_USER}@${CLEAN_HOST}:${CLEAN_DEPLOY_PATH}/docker-compose.prod.yml"

      - name: 远程拉取并部署
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          CLEAN_HOST="$(printf '%s' "$PROD_SERVER_HOST" | tr -d '\r\n' | xargs)"
          CLEAN_USER="$(printf '%s' "$PROD_SERVER_USER" | tr -d '\r\n' | xargs)"
          CLEAN_DEPLOY_PATH="$(printf '%s' "$PROD_DEPLOY_PATH" | tr -d '\r\n' | xargs)"
          ssh -i ~/.ssh/id_ed25519 "${CLEAN_USER}@${CLEAN_HOST}" "
            set -eu
            if [ -n '${ACR_REGISTRY}' ] && [ -n '${ACR_NAMESPACE}' ] && [ -n '${ACR_USERNAME}' ] && [ -n '${ACR_PASSWORD}' ]; then
              echo '${ACR_PASSWORD}' | docker login '${ACR_REGISTRY}' -u '${ACR_USERNAME}' --password-stdin
            else
              echo '${GHCR_TOKEN}' | docker login ${{ env.REGISTRY }} -u '${GHCR_USERNAME}' --password-stdin
            fi
            cd '${CLEAN_DEPLOY_PATH}'
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            docker system df
          "
