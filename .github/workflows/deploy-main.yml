name: 部署 main 到生产环境

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-production
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  verify:
    name: 测试与构建
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghactions -d ghactions"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            apps/studio-web/package-lock.json
            apps/public-web/package-lock.json

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r apps/cms-api/requirements/dev.txt \
            -r apps/ai-service/requirements/dev.txt

      - name: 安装 Studio 依赖
        working-directory: apps/studio-web
        run: npm ci

      - name: 安装 Public Web 依赖
        working-directory: apps/public-web
        run: npm ci

      - name: 安装本地包依赖
        run: |
          npm install --prefix apps/studio-web ./packages/editor-protocol

      - name: Django 检查
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: github-actions-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CSRF_TRUSTED_ORIGINS: http://localhost
          CMS_SITE_URL: http://localhost
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          AI_SERVICE_URL: http://localhost:8002
          DJANGO_INTERNAL_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
          NEXT_PUBLIC_AUTH_MODE: django-session
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/cms-api:${{ github.workspace }}
        working-directory: apps/cms-api
        run: python manage.py check

      - name: Django 测试
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: github-actions-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          CSRF_TRUSTED_ORIGINS: http://localhost
          CMS_SITE_URL: http://localhost
          POSTGRES_DB: ghactions
          POSTGRES_USER: ghactions
          POSTGRES_PASSWORD: ghactions
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          AI_SERVICE_URL: http://localhost:8002
          DJANGO_INTERNAL_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
          NEXT_PUBLIC_AUTH_MODE: django-session
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/cms-api:${{ github.workspace }}
        working-directory: apps/cms-api
        run: python manage.py test

      - name: FastAPI 测试
        env:
          INTERNAL_API_TOKEN: github-actions-internal-token
          AI_PROVIDER: mock
          AI_PROMPT_VERSION: v1
          RAG_PROVIDER: mock
          RAG_FORCE_MOCK: "true"
          PYTHONPATH: ${{ github.workspace }}/apps/ai-service:${{ github.workspace }}
        working-directory: apps/ai-service
        run: pytest

      - name: Studio Lint
        working-directory: apps/studio-web
        run: npm run lint

      - name: Studio 测试
        working-directory: apps/studio-web
        run: npm run test

      - name: Studio 构建
        env:
          NEXT_PUBLIC_DJANGO_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_EDITOR_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_AUTH_MODE: django-session
        working-directory: apps/studio-web
        run: npm run build

      - name: Public Web 构建
        env:
          NEXT_PUBLIC_DJANGO_PUBLIC_BASE_URL: http://localhost:8001
          NEXT_PUBLIC_SITE_URL: http://localhost:3003
        working-directory: apps/public-web
        run: npm run build

      - name: 契约校验
        run: |
          python3 -m json.tool contracts/article.schema.json > /dev/null
          python3 -m json.tool contracts/ai-review.schema.json > /dev/null
          python3 -m json.tool contracts/ai-suggestion.schema.json > /dev/null
          python3 -m json.tool contracts/ai-patch.schema.json > /dev/null
          python3 -m json.tool contracts/rag-search.schema.json > /dev/null
          python3 -m json.tool contracts/seo-context.schema.json > /dev/null
          python3 -m json.tool contracts/tiptap-document.schema.json > /dev/null

      - name: 后端镜像构建
        run: docker build -t cms-backend:ci .

  deploy:
    name: SSH 部署生产环境
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 SSH 私钥
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 上传生产环境变量
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          if [ -z "$PROD_ENV_FILE" ]; then
            echo "缺少 PROD_ENV_FILE Secret" >&2
            exit 1
          fi
          printf '%s\n' "$PROD_ENV_FILE" > .env.prod
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" \
            "mkdir -p '${{ secrets.PROD_DEPLOY_PATH }}'"
          scp -i ~/.ssh/id_ed25519 .env.prod \
            "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/.env.prod"

      - name: 打包部署代码
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.venv \
            --exclude=.pytest_cache \
            --exclude=apps/cms-api/media \
            -czf deploy-release.tgz .

      - name: 上传部署代码
        run: |
          scp -i ~/.ssh/id_ed25519 deploy-release.tgz \
            "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/deploy-release.tgz"

      - name: 远程部署
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" \
            "export DEPLOY_PATH='${{ secrets.PROD_DEPLOY_PATH }}' \
             NGINX_SITE_PATH='${{ secrets.PROD_NGINX_SITE_PATH }}' \
             SKIP_GIT_SYNC='1' && \
             cd '${{ secrets.PROD_DEPLOY_PATH }}' && \
             tar -xzf deploy-release.tgz && \
             rm -f deploy-release.tgz && \
             bash -s" < scripts/deploy_prod.sh
